services:
  postgres:
    image: postgres:16
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
       - "5434:5432"
    volumes:
      - ./data/db/postgres/data:/var/lib/postgresql/data
  
  redis:
    image: "redis:alpine"
    container_name: redis
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    volumes:
      - ./data/db/redis/redis-data:/var/lib/redis
      - ./data/db/redis/redis.conf:/usr/local/etc/redis/redis.conf
    environment:
      - REDIS_REPLICATION_MODE=master

  backend:
    build: .
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - postgres
      - redis

  frontend:
    build: C:\Users\ACER\Downloads\auth-ui
    container_name: frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
